name: Deploy to GitHub Pages 

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # שלב חכם שמזהה אוטומטית אם נוצרה תיקיית dist, build או public
      - name: Find build output
        id: find_output
        run: |
          for d in dist build public out; do
            if [ -d "$d" ]; then
              echo "output=$d" >> $GITHUB_OUTPUT
              echo "Found build output: $d"
              exit 0
            fi
          done
          echo "No known build output found" >&2
          exit 1

      # העלאת התיקייה האמיתית שנמצאה בשלב הקודם
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find_output.outputs.output }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4